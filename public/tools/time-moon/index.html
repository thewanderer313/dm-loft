  var origGet = ls.getItem.bind(ls),

      origRemove = ls.removeItem.bind(ls);

  ls.removeItem = function (k) { return origRemove(ns + k); };
})();

<style>
/* ===== Mobile-first control resizing ===== */
:root{
  --ui-gap: 10px;
}
/* make forms/controls scale naturally */
input[type="range"]{
  touch-action: pan-y;
}

/* Base sizing that scales with viewport */
button, input, select, label {
  font-size: clamp(12px, 2.6vw, 18px);
}

/* Try to catch likely control containers */
.controls, .toolbar, .control-bar, .ui, .panel, .hud, .bottom-bar, .top-bar, .control-row {
  display: flex;
  flex-wrap: wrap;
  gap: var(--ui-gap);
}

/* Make sliders span full width on small screens */
@media (max-width: 640px){
  .controls, .toolbar, .control-bar, .ui, .panel, .hud, .bottom-bar, .top-bar, .control-row {
    position: fixed;
    left: 0; right: 0;
    bottom: 0;
    padding: 10px 12px;
    background: rgba(15, 23, 42, 0.75);
    backdrop-filter: blur(6px);
    z-index: 1000;
  }

  /* Full-width sliders */
  input[type="range"]{
    width: 100% !important;
    -webkit-appearance: none;
    height: 28px;
  }

  /* Place labels above their inputs if adjacent */
  label{
    flex: 1 1 100%;
  }

  /* Buttons scale and wrap nicely */
  button{
    flex: 1 1 48%;
    padding: 10px 12px;
  }

  /* Avoid content underlap with fixed bar */
  body { padding-bottom: 120px; }
}

/* Slightly larger touch targets for tablets */
@media (min-width: 641px) and (max-width: 1024px){
  input[type="range"]{ height: 24px; }
  button{ padding: 10px 14px; }
}

/* Ensure any inline-sized sliders/buttons don't overflow */
input[type="range"], button {
  max-width: 100%;
}

/* Prevent overflow of long text on buttons */
button { white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }

</style><link rel="stylesheet" href="/tools/_tome.css">
</head>
<body>
<div class="sky" id="sky">
<div class="backdrop"></div>
<div class="row">
<div class="title">Oakhart Mountain — Time &amp; Moon Tracker</div>
<div class="tabs">
<button class="tab active" id="tab-explore">Exploration</button>
<button class="tab" id="tab-combat">Combat</button>
</div>
</div>
<div class="card">
<div class="badge" id="pausedBadge">SESSION PAUSED</div>
<div class="clock" id="clock">12:00<small>AM</small></div>
<div class="phase" id="phase">New Moon — Day 1</div>
<div class="controls">
<div class="explore-line" id="exploreLine">
<div class="group">
<button class="btn green" id="playPause">Pause</button>
<button class="btn amber" id="seedNow">Seed From Real Time</button>
</div>
<div class="group">
<label class="muted">Speed</label>
<input class="range" id="speed" max="10" min="1" step="1" type="range" value="1"/>
<div class="muted"><b id="speedLabel">1×</b></div>
</div>
</div>
<div class="explore-line" id="combatLine" style="display:none">
<button class="btn red wide" id="advanceRound">Advance Round (+6s)</button>
</div>
<div class="nudge-line">
<div class="group">
<button class="btn" data-nudge="-1000">-1s</button>
<button class="btn" data-nudge="-60000">-1m</button>
<button class="btn" data-nudge="-3600000">-1h</button>
</div>
<div class="group">
<button class="btn" data-nudge="1000">+1s</button>
<button class="btn" data-nudge="60000">+1m</button>
<button class="btn" data-nudge="3600000">+1h</button>
</div>
<div class="size-wrap">
<label class="muted">Display size</label>
<input class="range" id="size" max="1.8" min="0.8" step="0.05" type="range" value="1.25"/>
</div>
</div>
<div class="footer">
<button class="btn amber" id="resetDay1" style="flex:1">Reset to Day 1</button>
</div>
</div>
<div class="tagline">“Time is like life — it runs strangely in the Holler”</div>
</div>
</div>
<script>
(function(){
  const PHASE_LABELS = ["New Moon","Waxing Crescent","First Quarter","Waxing Gibbous","Full Moon","Waning Gibbous","Last Quarter","Waning Crescent"];
  const LS_KEY = "oakhart-time-tracker-final2";
  function clamp(n,min,max){return Math.max(min,Math.min(max,n));}
  function startOfDay(d){const x=new Date(d);x.setHours(0,0,0,0);return x;}
  function daysBetween(a,b){return Math.floor((startOfDay(b)-startOfDay(a))/86400000);}
  function pad(n){return String(n).padStart(2,'0');}
  function fmt12(h,m,s,showSeconds){
    const am = h<12; let hh = h%12; if(hh===0) hh=12;
    return pad(hh)+":"+pad(m)+(showSeconds?(":"+pad(s)):"")+ (am?" AM":" PM");
  }
  function realMoonPhaseIndex(date=new Date()){
    const year=date.getUTCFullYear(); const month=date.getUTCMonth()+1; const day=date.getUTCDate();
    let r=year%100; r%=19; if(r>9) r-=19; r=((r*11)%30)+month+day; if(month<3) r+=2;
    const phase=(r<0?r+30:r)%30; return Math.round((phase/29.53)*7)%8;
  }
  function skyGradientForHour(h){
    if(h<5) return ['#0b1230','#0a0f26','#050812'];
    if(h<8) return ['#2a0f2f','#6b1d47','#f2a65a'];
    if(h<17) return ['#9bd3ff','#6fb3ff','#cfe9ff'];
    if(h<20) return ['#ffd79a','#ff8c5a','#5a3a87'];
    return ['#0b1230','#0a0f26','#050812'];
  }

  // State
  let state = load() || seedFromNow({});
  let isRunning = state.isRunning ?? true;
  let mode = state.mode ?? "exploration";
  let multiplier = state.multiplier ?? 1;
  let scale = state.scale ?? 1.25;
  let inGameTime = new Date(state.inGameTime);
  let startInGameTime = new Date(state.startInGameTime);
  let baseMoonPhase = state.baseMoonPhase ?? realMoonPhaseIndex(new Date());
  let lastStamp = performance.now();

  // Elements
  const skyEl = document.getElementById('sky');
  const clockEl = document.getElementById('clock');
  const phaseEl = document.getElementById('phase');
  const playPauseBtn = document.getElementById('playPause');
  const seedNowBtn = document.getElementById('seedNow');
  const speedRange = document.getElementById('speed');
  const speedLabel = document.getElementById('speedLabel');
  const sizeRange = document.getElementById('size');
  const advanceRoundBtn = document.getElementById('advanceRound');
  const tabExplore = document.getElementById('tab-explore');
  const tabCombat = document.getElementById('tab-combat');
  const exploreLine = document.getElementById('exploreLine');
  const combatLine = document.getElementById('combatLine');
  const resetDay1Btn = document.getElementById('resetDay1');
  const nudgeButtons = Array.from(document.querySelectorAll('[data-nudge]'));
  const pausedBadge = document.getElementById('pausedBadge');

  // Init UI
  applyScale(scale);
  speedRange.value = multiplier; speedLabel.textContent = multiplier+"×";
  sizeRange.value = scale;
  setMode(mode);
  updateAll();
  refreshPausedBadge();

  // Loop
  function tick(now){
    if(mode==='exploration' && isRunning){
      const dtReal = now - lastStamp;
      const dtGame = dtReal * clamp(multiplier,1,10);
      if(dtGame>0) inGameTime = new Date(inGameTime.getTime()+dtGame);
      persist(); updateAll();
    }
    lastStamp = now;
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // Handlers
  playPauseBtn.addEventListener('click', ()=>{
    isRunning = !isRunning;
    playPauseBtn.textContent = isRunning ? 'Pause':'Play';
    playPauseBtn.className = 'btn ' + (isRunning?'green':'amber');
    refreshPausedBadge();
    persist();
  });
  seedNowBtn.addEventListener('click', ()=>{
    const now = new Date();
    inGameTime = new Date(now);
    startInGameTime = new Date(now);
    baseMoonPhase = realMoonPhaseIndex(now);
    persist(); updateAll();
  });
  speedRange.addEventListener('input', e=>{
    multiplier = parseInt(e.target.value,10);
    speedLabel.textContent = multiplier+"×";
    persist();
  });
  sizeRange.addEventListener('input', e=>{
    scale = parseFloat(e.target.value);
    applyScale(scale); persist();
  });
  advanceRoundBtn.addEventListener('click', ()=> adjustTime(6000));
  tabExplore.addEventListener('click', ()=> setMode('exploration'));
  tabCombat.addEventListener('click', ()=> setMode('combat'));
  resetDay1Btn.addEventListener('click', ()=>{
    const start = new Date(); start.setHours(6,0,0,0);
    inGameTime = new Date(start); startInGameTime = new Date(start);
    baseMoonPhase = realMoonPhaseIndex(start); persist(); updateAll();
  });
  nudgeButtons.forEach(btn=> btn.addEventListener('click', ()=>{
    const ms = parseInt(btn.getAttribute('data-nudge'),10); adjustTime(ms);
  }));

  function setMode(m){
    mode = m;
    if(mode==='exploration'){
      tabExplore.classList.add('active'); tabCombat.classList.remove('active');
      exploreLine.style.display=''; combatLine.style.display='none';
      skyEl.classList.remove('combat');
      // Exploration uses inline gradient background
      const g = skyGradientForHour(inGameTime.getHours());
      skyEl.style.background = 'linear-gradient(to bottom,'+g[0]+','+g[1]+','+g[2]+')';
    } else {
      tabCombat.classList.add('active'); tabExplore.classList.remove('active');
      combatLine.style.display=''; exploreLine.style.display='none';
      skyEl.classList.add('combat');
      // IMPORTANT: clear inline gradient so CSS background-image shows
      skyEl.style.background = '';
    }
    persist(); updateAll();
  }

  function applyScale(s){
    document.documentElement.style.setProperty('--scale', s.toString());
  }
  function refreshPausedBadge(){
    pausedBadge.classList.toggle('show', !isRunning);
  }
  function adjustTime(ms){
    inGameTime = new Date(inGameTime.getTime()+ms); persist(); updateAll();
  }
  function updateAll(){
    const h=inGameTime.getHours(), m=inGameTime.getMinutes(), s=inGameTime.getSeconds();
    const showSeconds = (mode==='combat');
    const str = fmt12(h,m,s,showSeconds);
    const parts = str.split(' ');
    clockEl.innerHTML = parts[0] + '<small>' + (parts[1]||'') + '</small>';

    if(mode==='exploration'){
      const g = skyGradientForHour(h);
      skyEl.style.background = 'linear-gradient(to bottom,'+g[0]+','+g[1]+','+g[2]+')';
    }
    const daysElapsed = daysBetween(startInGameTime,inGameTime);
    const idx = (baseMoonPhase + Math.floor(daysElapsed/2)) % 8;
    phaseEl.textContent = PHASE_LABELS[idx] + ' — Day ' + (daysElapsed+1);
  }

  function seedFromNow(s){
    const now=new Date();
    return { isRunning:true, mode:"exploration", multiplier:1, scale:1.25,
      inGameTime: now.toISOString(), startInGameTime: now.toISOString(),
      baseMoonPhase: realMoonPhaseIndex(now) };
  }
  function persist(){
    const obj={isRunning,mode,multiplier,scale,
      inGameTime: inGameTime.toISOString(),
      startInGameTime: startInGameTime.toISOString(),
      baseMoonPhase};
    try{ localStorage.setItem(LS_KEY, JSON.stringify(obj)); }catch(e){}
  }
  function load(){
    try{ const raw = localStorage.getItem(LS_KEY); return raw?JSON.parse(raw):null;}catch(e){return null;}
  }
})();
</script>
</body>
</html>
